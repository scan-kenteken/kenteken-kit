# npm Trusted Publishing (OIDC) is configured for this workflow filename: ci.yml
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing on version tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci
      - run: npm run version:check
      - run: npm run typecheck
      - run: npm test
      - run: ./gradlew test
        working-directory: kotlin

  release:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$PKG" ]; then
            echo "Tag v${TAG}, VERSION (${VERSION}), and package.json (${PKG}) must match"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Maven release secrets
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          test -n "$CENTRAL_PORTAL_USERNAME" || { echo "CENTRAL_PORTAL_USERNAME is not set"; exit 1; }
          test -n "$CENTRAL_PORTAL_PASSWORD" || { echo "CENTRAL_PORTAL_PASSWORD is not set"; exit 1; }
          test -n "$SIGNING_KEY" || { echo "SIGNING_KEY is not set"; exit 1; }

      - name: Publish to npm
        run: |
          npm ci
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published on npm; skipping npm publish"
          else
            npm publish
          fi

      - name: Publish to Maven Central
        working-directory: kotlin
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          ./gradlew publish -PpublishToMavenCentral=true
          AUTH="$(printf '%s:%s' "$CENTRAL_PORTAL_USERNAME" "$CENTRAL_PORTAL_PASSWORD" | base64 -w0)"
          curl --fail-with-body -sS -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.scan-kenteken" \
            -H "Authorization: Bearer ${AUTH}"
          echo ""
          echo "Maven deployment sent to Central Portal — validate and publish at https://central.sonatype.com/publishing"
