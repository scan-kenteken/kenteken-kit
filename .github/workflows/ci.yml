# npm Trusted Publishing (OIDC) is configured for this workflow filename: ci.yml
name: CI

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing on version tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci
      - run: npm run version:check
      - run: npm run typecheck
      - run: npm test
      - run: ./gradlew test
        working-directory: kotlin

  release:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$PKG" ]; then
            echo "Tag v${TAG}, VERSION (${VERSION}), and package.json (${PKG}) must match"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Maven release secrets
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME || secrets.CENTRALPORTALUSERNAME || secrets['CENTRAL _PORTAL_USERNAME'] }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD || secrets.CENTRALPORTALPASSWORD || secrets['CENTRAL _PORTAL_PASSWORD'] }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          test -n "$CENTRAL_PORTAL_USERNAME" || { echo "Central Portal username secret is not set"; exit 1; }
          test -n "$CENTRAL_PORTAL_PASSWORD" || { echo "Central Portal password secret is not set"; exit 1; }
          test -n "$SIGNING_KEY" || { echo "SIGNING_KEY is not set"; exit 1; }
          if [[ "$SIGNING_KEY" == *"BEGIN PGP PUBLIC KEY BLOCK"* ]]; then
            echo "SIGNING_KEY is a public key — export the private/secret key instead."
            exit 1
          elif [[ "$SIGNING_KEY" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]] \
            || [[ "$SIGNING_KEY" == *"BEGIN PGP SECRET KEY BLOCK"* ]]; then
            echo "SIGNING_KEY: armored private key"
          elif printf '%s' "$SIGNING_KEY" | base64 -d 2>/dev/null | grep -qE "BEGIN PGP (PRIVATE|SECRET) KEY BLOCK"; then
            echo "SIGNING_KEY: base64-encoded armored private key"
          else
            echo "SIGNING_KEY does not look like a PGP private key (length ${#SIGNING_KEY})."
            echo "Paste the full -----BEGIN PGP PRIVATE KEY BLOCK----- ... -----END PGP PRIVATE KEY BLOCK-----"
            echo "Or store it base64-encoded: gpg --armor --export-secret-keys <id> | base64 -w0"
            exit 1
          fi

      - name: Publish to npm
        run: |
          npm ci
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published on npm; skipping npm publish"
          else
            npm run typecheck
            npm test
            trap 'node scripts/pack-readme.mjs restore' EXIT
            node scripts/pack-readme.mjs npm
            npm publish --ignore-scripts
          fi

      - name: Publish to Maven Central
        working-directory: kotlin
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME || secrets.CENTRALPORTALUSERNAME || secrets['CENTRAL _PORTAL_USERNAME'] }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD || secrets.CENTRALPORTALPASSWORD || secrets['CENTRAL _PORTAL_PASSWORD'] }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          KEY_FILE="${RUNNER_TEMP}/signing.key"
          if [[ "$SIGNING_KEY" == *"BEGIN PGP"* ]]; then
            printf '%s\n' "$SIGNING_KEY" > "$KEY_FILE"
          else
            printf '%s' "$SIGNING_KEY" | base64 -d > "$KEY_FILE"
          fi
          export SIGNING_KEY_FILE="$KEY_FILE"
          ./gradlew publish -PpublishToMavenCentral=true
          AUTH="$(printf '%s:%s' "$CENTRAL_PORTAL_USERNAME" "$CENTRAL_PORTAL_PASSWORD" | base64 -w0)"
          curl --fail-with-body -sS -X POST \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.scan-kenteken" \
            -H "Authorization: Bearer ${AUTH}"
          echo ""
          echo "Maven deployment sent to Central Portal — validate and publish at https://central.sonatype.com/publishing"
